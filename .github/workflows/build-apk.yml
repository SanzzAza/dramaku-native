name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release after build'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          set -e
          if [ -f version.properties ]; then
            VERSION_NAME=$(grep -E '^VERSION_NAME=' version.properties | cut -d= -f2 | tr -d '\r')
            VERSION_CODE=$(grep -E '^VERSION_CODE=' version.properties | cut -d= -f2 | tr -d '\r')
          else
            VERSION_NAME=0.0.0
            VERSION_CODE=1
          fi

          # Tags like v4.3.0 or v4.3.0-build12 override the display version name.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            VERSION_NAME="${TAG_NAME#v}"
            VERSION_NAME="${VERSION_NAME%%-build*}"
            CREATE_RELEASE=true
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.create_release }}" = "true" ]; then
            CREATE_RELEASE=true
          else
            CREATE_RELEASE=false
          fi

          # Keep versionCode monotonic and unique per CI run.
          if [ "${VERSION_CODE}" -lt "${{ github.run_number }}" ]; then
            VERSION_CODE=${{ github.run_number }}
          fi

          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "CREATE_RELEASE=$CREATE_RELEASE" >> "$GITHUB_ENV"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Resolved versionName=$VERSION_NAME versionCode=$VERSION_CODE create_release=$CREATE_RELEASE"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create Gradle Wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          DRAMAKU_VERSION_NAME: ${{ env.VERSION_NAME }}
          DRAMAKU_VERSION_CODE: ${{ env.VERSION_CODE }}
        run: |
          set -e
          mkdir -p app/build/outputs/apk/final

          SIGNING_OK=false
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ]; then
            echo "Signing secrets found. Validating keystore..."
            if echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/release.keystore; then
              export ANDROID_KEYSTORE_PATH="$PWD/app/release.keystore"
              if keytool -list \
                    -keystore "$ANDROID_KEYSTORE_PATH" \
                    -storepass "$ANDROID_KEYSTORE_PASSWORD" \
                    -alias "$ANDROID_KEY_ALIAS" >/tmp/keytool-list.log 2>&1 && \
                 keytool -certreq \
                    -keystore "$ANDROID_KEYSTORE_PATH" \
                    -storepass "$ANDROID_KEYSTORE_PASSWORD" \
                    -keypass "$ANDROID_KEYSTORE_PASSWORD" \
                    -alias "$ANDROID_KEY_ALIAS" \
                    -file /tmp/dramaku-signing-test.csr >/tmp/keytool-certreq.log 2>&1; then
                SIGNING_OK=true
              else
                echo "::warning::Signing secrets are present but invalid. Falling back to release APK signed with debug key."
                echo "::warning::Most common fix: regenerate using scripts/create-release-keystore.sh, then update ANDROID_KEYSTORE_BASE64 / PASSWORD / ALIAS."
                cat /tmp/keytool-list.log 2>/dev/null || true
                cat /tmp/keytool-certreq.log 2>/dev/null || true
              fi
            else
              echo "::warning::ANDROID_KEYSTORE_BASE64 could not be decoded. Falling back to release APK signed with debug key."
            fi
          else
            echo "Signing secrets not found. Building release APK signed with debug key fallback..."
          fi

          if [ "$SIGNING_OK" = "true" ]; then
            echo "Building signed release APK..."
            # Force PKCS12 key password to store password for Gradle signing reliability.
            export ANDROID_KEY_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
            ./gradlew assembleRelease
            cp app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/final/Dramaku-v${VERSION_NAME}-release.apk"
            echo "APK_PATH=app/build/outputs/apk/final/Dramaku-v${VERSION_NAME}-release.apk" >> "$GITHUB_ENV"
            echo "APK_NAME=Dramaku-v${VERSION_NAME}-release" >> "$GITHUB_ENV"
            echo "APK_KIND=signed release" >> "$GITHUB_ENV"
          else
            echo "Building release APK signed with debug key fallback..."
            ./gradlew assembleRelease
            cp app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/final/Dramaku-v${VERSION_NAME}-release-debugkey.apk"
            echo "APK_PATH=app/build/outputs/apk/final/Dramaku-v${VERSION_NAME}-release-debugkey.apk" >> "$GITHUB_ENV"
            echo "APK_NAME=Dramaku-v${VERSION_NAME}-release-debugkey" >> "$GITHUB_ENV"
            echo "APK_KIND=release signed with debug key fallback" >> "$GITHUB_ENV"
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}

      - name: Create Release
        if: env.CREATE_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}-build{1}', env.VERSION_NAME, github.run_number) }}
          name: Dramaku v${{ env.VERSION_NAME }}
          files: ${{ env.APK_PATH }}
          generate_release_notes: true
          body: |
            **Dramaku v${{ env.VERSION_NAME }}** (`versionCode` ${{ env.VERSION_CODE }})
            Build type: ${{ env.APK_KIND }}

            ### Highlights
            - Kotlin + Jetpack Compose native MVP
            - Native home/search/detail/library/settings
            - Native ExoPlayer playback
            - Release variant APK is always built; if signing secrets are missing it uses debug-key fallback
            - Versioning terpusat (`version.properties`)
            - Release GitHub hanya dari tag `v*` / manual dispatch

            Untuk signed release APK, set GitHub Secrets:
            - ANDROID_KEYSTORE_BASE64
            - ANDROID_KEYSTORE_PASSWORD
            - ANDROID_KEY_ALIAS
            - ANDROID_KEY_PASSWORD
